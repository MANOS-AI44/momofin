name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Gradle wrapper
        working-directory: MoMoFin
        run: gradle wrapper --gradle-version 8.5

      - name: Decode release keystore (if secret present)
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > MoMoFin/keystore.jks
          ls -la MoMoFin/keystore.jks
          echo "HAS_KEYSTORE=true" >> $GITHUB_ENV

      - name: Build APK (release if keystore, else debug)
        working-directory: MoMoFin
        env:
          RELEASE_KEYSTORE_FILE: ${{ env.HAS_KEYSTORE == 'true' && '../keystore.jks' || '' }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          if [ "$HAS_KEYSTORE" = "true" ] && [ -n "$RELEASE_KEYSTORE_PASSWORD" ]; then
            echo "🔐 Build RELEASE signe"
            ./gradlew assembleRelease --no-daemon --stacktrace
            mkdir -p app/build/outputs/apk/dist
            cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/dist/MoMoFin.apk
          else
            echo "🔓 Build DEBUG (pas de keystore configure)"
            ./gradlew assembleDebug --no-daemon --stacktrace
            mkdir -p app/build/outputs/apk/dist
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/dist/MoMoFin.apk
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/dist/MoMoFin-debug.apk
          fi
          ls -la app/build/outputs/apk/dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoMoFin-apk
          path: MoMoFin/app/build/outputs/apk/dist/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create or update release "latest"
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Derniere compilation"
          body: |
            APK MoMo Fin compile automatiquement depuis le commit ${{ github.sha }}.

            **MoMoFin.apk** — application tout-en-un (SMS + notifications + tableau de bord + comptes + points)

            Telechargez et installez sur Android. Si Google Play Protect bloque,
            voir le guide sur la page /installer du site web.
          files: |
            MoMoFin/app/build/outputs/apk/dist/MoMoFin.apk
            MoMoFin/app/build/outputs/apk/dist/MoMoFin-debug.apk
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false
