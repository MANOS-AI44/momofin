name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Gradle wrapper
        working-directory: MoMoFin
        run: gradle wrapper --gradle-version 8.5

      - name: Decode release keystore (si secret present)
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > MoMoFin/keystore.jks
            echo "HAS_KEYSTORE=true" >> $GITHUB_ENV
          else
            echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
          fi

      - name: Build DEBUG (capture le log d'erreur)
        id: debug
        continue-on-error: true
        working-directory: MoMoFin
        run: |
          chmod +x ./gradlew
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build-debug.log
          mkdir -p app/build/outputs/apk/dist
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/dist/MoMoFin-debug.apk
            echo "DEBUG_OK=true" >> $GITHUB_ENV
          fi

      - name: Afficher les erreurs DEBUG (si echec)
        if: steps.debug.outcome == 'failure'
        run: |
          echo "===== DERNIERES LIGNES DU LOG DEBUG (erreurs) ====="
          grep -E "^e: |error:|FAILED|Caused by|Unresolved|> Task .* FAILED|what went wrong" /tmp/build-debug.log | head -60 || true
          echo "===== FIN ====="
          echo "----- 80 dernieres lignes brutes -----"
          tail -80 /tmp/build-debug.log

      - name: Build RELEASE (bonus, tolere l'echec)
        id: release
        continue-on-error: true
        working-directory: MoMoFin
        env:
          RELEASE_KEYSTORE_FILE: ${{ env.HAS_KEYSTORE == 'true' && '../keystore.jks' || '' }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ "$HAS_KEYSTORE" = "true" ] && [ -n "$RELEASE_KEYSTORE_PASSWORD" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace -x lintVitalRelease 2>&1 | tee /tmp/build-release.log || true
            if [ -f app/build/outputs/apk/release/app-release.apk ]; then
              cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/dist/MoMoFin.apk
            fi
          fi

      - name: Choisir l'APK final
        working-directory: MoMoFin
        run: |
          cd app/build/outputs/apk/dist 2>/dev/null || { echo "Aucun dossier dist - les 2 builds ont echoue"; exit 1; }
          if [ ! -f MoMoFin.apk ] && [ -f MoMoFin-debug.apk ]; then
            cp MoMoFin-debug.apk MoMoFin.apk
          fi
          if [ ! -f MoMoFin.apk ]; then
            echo "❌ Aucun APK produit"; exit 1
          fi
          echo "=== APK disponibles ==="; ls -la

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoMoFin-apk
          path: MoMoFin/app/build/outputs/apk/dist/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create or update release "latest"
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Derniere compilation"
          body: |
            APK MoMo Fin compile automatiquement depuis le commit ${{ github.sha }}.
            **MoMoFin.apk** — application tout-en-un.
            Guide d'installation sur la page /installer du site web.
          files: |
            MoMoFin/app/build/outputs/apk/dist/MoMoFin.apk
            MoMoFin/app/build/outputs/apk/dist/MoMoFin-debug.apk
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false
