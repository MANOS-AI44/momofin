name: Build APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ MoMoSMS, MoMoFin ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Gradle wrapper
        working-directory: ${{ matrix.project }}
        run: gradle wrapper --gradle-version 8.5

      - name: Build debug APK
        working-directory: ${{ matrix.project }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        working-directory: ${{ matrix.project }}/app/build/outputs/apk/debug
        run: |
          mv app-debug.apk ${{ matrix.project }}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}-debug-apk
          path: ${{ matrix.project }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move APKs to root
        run: |
          mkdir -p release-apks
          find artifacts -name "*.apk" -exec cp {} release-apks/ \;
          ls -la release-apks/
      - name: Create or update release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Dernière compilation des APK"
          body: |
            APK compilés automatiquement à partir du commit ${{ github.sha }}.

            - **MoMoSMS-debug.apk** — lit les SMS Mobile Money
            - **MoMoFin-debug.apk** — extraction, PDF, PATRON, synchro Railway

            Téléchargez directement ci-dessous, copiez sur votre téléphone Android et installez.
          files: release-apks/*.apk
          prerelease: false
          make_latest: true
