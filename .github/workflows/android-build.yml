name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Gradle wrapper
        working-directory: MoMoFin
        run: gradle wrapper --gradle-version 8.5

      - name: Build debug APK
        working-directory: MoMoFin
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        working-directory: MoMoFin/app/build/outputs/apk/debug
        run: mv app-debug.apk MoMoFin-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoMoFin-debug-apk
          path: MoMoFin/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create or update release "latest"
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Dernière compilation"
          body: |
            APK MoMo Fin compilé automatiquement à partir du commit ${{ github.sha }}.

            **MoMoFin-debug.apk** — application tout-en-un (SMS + notifications + tableau de bord + comptes + points)

            Téléchargez et installez sur votre téléphone Android.
          files: MoMoFin/app/build/outputs/apk/debug/MoMoFin-debug.apk
          prerelease: false
          make_latest: true
